image: docker:24

services:
  - docker:24-dind

variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_BUILDKIT: "1"

stages:
  - build

build-and-push:
  stage: build
  script:
    - echo "Logging into GitLab registry"
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

    - echo "Create buildx builder"
    - docker buildx create --use

    - echo "Building and pushing image with Buildx"
    - docker buildx build --push -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA -t $CI_REGISTRY_IMAGE:latest .