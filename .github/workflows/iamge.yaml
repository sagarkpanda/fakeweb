name: Build, Test, and Push

on:
  push:
    paths-ignore:
      - '*.md'
    branches:
      - master
  workflow_dispatch:

jobs:
  # JOB 1: Lints the code (Runs in parallel with build)
  lint-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linters
        run: npm install -g htmlhint stylelint stylelint-config-standard

      - name: Run HTML Hint
        run: htmlhint "fbweb/**/*.html"

      - name: Run Stylelint
        run: stylelint "fbweb/**/*.css" --config stylelint-config-standard || true

  # JOB 2: Builds the image (Runs in parallel with lint)
  build-image:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build local image for testing
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: test-image:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image as artifact
        run: docker save test-image:latest > test-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-image
          path: test-image.tar
          retention-days: 1

  # JOB 3: Tests the container
  test-image:
    runs-on: ubuntu-latest
    needs: [lint-code, build-image]
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: test-image

      - name: Load Docker image
        run: docker load < test-image.tar

      - name: Start container
        run: docker run -d -p 8080:80 --name webtest test-image:latest

      - name: Wait for Apache
        run: sleep 5

      - name: Verify Content
        run: curl -s http://localhost:8080 | grep -qi "Facebook"

  # JOB 4: Push to Registry (Only if tests pass)
  push-image:
    runs-on: ubuntu-latest
    needs: test-image
    permissions:
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Final Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          sbom: false
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.run_number }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
