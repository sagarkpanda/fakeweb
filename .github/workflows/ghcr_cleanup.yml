name: GHCR Cleanup

on:
  schedule:
    - cron: '0 0 * * 0' # weekly
  workflow_dispatch: 
jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/delete-package-versions@v5
        with:
          package-name: my-app
          package-type: container
          min-versions-to-keep: 10
          delete-only-untagged-versions: true
